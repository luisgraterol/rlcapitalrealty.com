<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owner Login — R&L Capital Realty LLC</title>
<meta name="robots" content="noindex, nofollow">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%230f1f2e'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='26' font-weight='400' fill='%23c9a96e'%3ERL%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f2e;--navy-mid:#1a2f44;--navy-light:#243a52;
  --gold:#c9a96e;--gold-light:#dfc090;--gold-dim:#a8885a;
  --cream:#faf8f4;--cream-dark:#f2ede4;
  --text-body:#3d3530;--text-muted:#7a6e65;
  --error:#c0392b;--success:#2e7d5e;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --t:.35s cubic-bezier(.4,0,.2,1);
}

html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--navy);
  color:var(--text-body);
  font-size:16px;
  line-height:1.6;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  overflow-x:hidden;
}

/* Background geometry */
.page-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.page-bg::before{
  content:'';position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,169,110,.06) 0%,transparent 70%);
  top:-200px;right:-200px;
}
.page-bg::after{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,169,110,.04) 0%,transparent 70%);
  bottom:-150px;left:-100px;
}
.grid-lines{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(201,169,110,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,169,110,.03) 1px,transparent 1px);
  background-size:60px 60px;
}
.geo{
  position:fixed;top:10%;right:6%;width:260px;height:260px;
  border:1px solid rgba(201,169,110,.1);transform:rotate(15deg);
  pointer-events:none;z-index:0;
  animation:geo-drift 18s ease-in-out infinite;
}
.geo::before{
  content:'';position:absolute;inset:22px;
  border:1px solid rgba(201,169,110,.06);transform:rotate(-8deg);
}
@keyframes geo-drift{0%,100%{transform:rotate(15deg) translateY(0)}50%{transform:rotate(15deg) translateY(-10px)}}

/* Header */
.site-header{
  position:relative;z-index:10;
  padding:28px 5vw;
  display:flex;align-items:center;
}
.wordmark{
  font-family:var(--serif);font-weight:400;font-size:1.1rem;
  letter-spacing:.04em;color:var(--cream);text-decoration:none;
  display:flex;align-items:center;gap:10px;
}
.wordmark-accent{color:var(--gold)}
.wordmark-divider{width:1px;height:16px;background:rgba(201,169,110,.35)}
.wordmark-sub{
  font-family:var(--sans);font-size:.6rem;font-weight:300;
  letter-spacing:.14em;color:rgba(250,248,244,.45);text-transform:uppercase;
}

/* Main layout */
main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px 5vw 60px;position:relative;z-index:1;
}

/* Card */
.card{
  background:var(--cream);width:100%;max-width:420px;
  padding:48px 44px;position:relative;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 1px rgba(201,169,110,.12);
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-dim));
}

.card-eyebrow{
  font-family:var(--sans);font-size:.65rem;font-weight:500;
  letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.card-eyebrow::before{content:'';display:block;width:22px;height:1px;background:var(--gold-dim)}

.card-title{
  font-family:var(--serif);font-weight:400;font-size:2rem;
  color:var(--navy);line-height:1.15;margin-bottom:32px;
  letter-spacing:-.01em;
}
.card-title em{font-style:italic;color:var(--gold-dim)}

/* Form */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.form-label{
  font-size:.72rem;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-muted);
}
.form-input{
  width:100%;padding:12px 14px;
  border:1px solid rgba(15,31,46,.15);border-radius:2px;
  font-family:var(--sans);font-size:.95rem;color:var(--navy);
  background:white;outline:none;
  transition:border-color var(--t),box-shadow var(--t);
}
.form-input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,169,110,.12);
}
.form-input::placeholder{color:rgba(61,53,48,.3)}
.form-input.error{border-color:var(--error);box-shadow:0 0 0 3px rgba(192,57,43,.08)}

/* Buttons */
.btn-submit{
  width:100%;padding:13px 24px;
  background:var(--navy);color:var(--cream);
  font-family:var(--sans);font-size:.78rem;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  border:none;border-radius:2px;cursor:pointer;
  transition:background var(--t),transform var(--t),box-shadow var(--t);
  position:relative;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:8px;
}
.btn-submit:hover:not(:disabled){
  background:var(--navy-light);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(15,31,46,.3);
}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}

.btn-spinner{
  width:14px;height:14px;border:2px solid rgba(250,248,244,.3);
  border-top-color:var(--cream);border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.btn-submit.loading .btn-spinner{display:block}
.btn-submit.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* Alert messages */
.alert{
  padding:12px 14px;border-radius:2px;
  font-size:.85rem;line-height:1.5;margin-bottom:20px;
  display:none;
}
.alert.show{display:block}
.alert-error{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--error)}
.alert-success{background:rgba(46,125,94,.08);border:1px solid rgba(46,125,94,.2);color:var(--success)}

/* Links & secondary actions */
.form-footer{margin-top:20px;text-align:center}
.text-link{
  font-size:.82rem;color:var(--gold-dim);text-decoration:none;
  border-bottom:1px solid transparent;transition:border-color var(--t),color var(--t);
  cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;
  font-family:var(--sans);padding:0;
}
.text-link:hover{color:var(--gold);border-bottom-color:var(--gold)}

.divider{
  display:flex;align-items:center;gap:12px;
  margin:28px 0;color:rgba(61,53,48,.3);font-size:.78rem;letter-spacing:.06em;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(15,31,46,.1)}

/* View switching */
.view{display:none}
.view.active{display:block}

/* Footer */
.site-footer{
  position:relative;z-index:1;text-align:center;
  padding:20px 5vw 32px;
  font-size:.72rem;color:rgba(250,248,244,.25);letter-spacing:.06em;
}
.site-footer a{color:rgba(250,248,244,.35);text-decoration:none;transition:color var(--t)}
.site-footer a:hover{color:var(--gold)}

@media(max-width:480px){
  .card{padding:36px 28px}
  .geo{display:none}
}
</style>
</head>
<body>

<div class="page-bg"></div>
<div class="grid-lines"></div>
<div class="geo"></div>

<header class="site-header">
  <a href="/" class="wordmark">
    <span>R<span class="wordmark-accent">&</span>L Capital Realty</span>
    <span class="wordmark-divider"></span>
    <span class="wordmark-sub">LLC</span>
  </a>
</header>

<main>
  <div class="card">

    <!-- ── VIEW: LOGIN ─────────────────────────────────────────────── -->
    <div class="view active" id="view-login">
      <div class="card-eyebrow">Owner Portal</div>
      <h1 class="card-title">Welcome<br><em>back</em></h1>

      <div class="alert alert-error" id="login-error" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input
            id="login-email" name="email" type="email"
            class="form-input" placeholder="you@rlcapitalrealty.com"
            autocomplete="email" required
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input
            id="login-password" name="password" type="password"
            class="form-input" placeholder="••••••••"
            autocomplete="current-password" required
          >
        </div>

        <button type="submit" class="btn-submit" id="login-btn">
          <div class="btn-spinner"></div>
          <span class="btn-text">Sign In</span>
        </button>
      </form>

      <div class="form-footer">
        <button class="text-link" id="goto-forgot">Forgot your password?</button>
      </div>
    </div>

    <!-- ── VIEW: FORGOT PASSWORD ───────────────────────────────────── -->
    <div class="view" id="view-forgot">
      <div class="card-eyebrow">Password Reset</div>
      <h1 class="card-title">Reset your<br><em>password</em></h1>

      <div class="alert alert-error" id="forgot-error" role="alert"></div>
      <div class="alert alert-success" id="forgot-success" role="alert"></div>

      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="forgot-email">Email</label>
          <input
            id="forgot-email" name="email" type="email"
            class="form-input" placeholder="you@rlcapitalrealty.com"
            autocomplete="email" required
          >
        </div>

        <button type="submit" class="btn-submit" id="forgot-btn">
          <div class="btn-spinner"></div>
          <span class="btn-text">Send Reset Link</span>
        </button>
      </form>

      <div class="form-footer">
        <button class="text-link" id="goto-login">Back to sign in</button>
      </div>
    </div>

  </div>
</main>

<footer class="site-footer">
  <a href="/">rlcapitalrealty.com</a> &nbsp;&middot;&nbsp; &copy; 2026 R&amp;L Capital Realty LLC
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/auth.js"></script>
<script>
(async () => {
  await redirectIfLoggedIn();

  const views      = { login: document.getElementById('view-login'), forgot: document.getElementById('view-forgot') };
  const loginError = document.getElementById('login-error');
  const loginBtn   = document.getElementById('login-btn');
  const forgotError   = document.getElementById('forgot-error');
  const forgotSuccess = document.getElementById('forgot-success');
  const forgotBtn     = document.getElementById('forgot-btn');

  function showView(name) {
    Object.values(views).forEach(v => v.classList.remove('active'));
    views[name].classList.add('active');
    loginError.classList.remove('show');
    forgotError.classList.remove('show');
    forgotSuccess.classList.remove('show');
  }

  function setLoading(btn, on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  function showError(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  document.getElementById('goto-forgot').addEventListener('click', () => showView('forgot'));
  document.getElementById('goto-login').addEventListener('click',  () => showView('login'));

  // ── Login ──────────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    loginError.classList.remove('show');

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showError(loginError, 'Please enter your email and password.');
      return;
    }

    setLoading(loginBtn, true);
    const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
    setLoading(loginBtn, false);

    if (error) {
      showError(loginError, 'Invalid email or password. Please try again.');
    } else {
      window.location.replace('/admin.html');
    }
  });

  // ── Forgot password ────────────────────────────────────────────────
  document.getElementById('forgot-form').addEventListener('submit', async e => {
    e.preventDefault();
    forgotError.classList.remove('show');
    forgotSuccess.classList.remove('show');

    const email = document.getElementById('forgot-email').value.trim();

    if (!email) {
      showError(forgotError, 'Please enter your email address.');
      return;
    }

    setLoading(forgotBtn, true);
    const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth/callback.html',
    });
    setLoading(forgotBtn, false);

    if (error) {
      showError(forgotError, 'Something went wrong. Please try again.');
    } else {
      forgotSuccess.textContent = 'Check your inbox — a reset link is on its way.';
      forgotSuccess.classList.add('show');
      document.getElementById('forgot-form').reset();
    }
  });
})();
</script>
</body>
</html>
